<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pack Tracker — iPhone 17 Pro (Direction C)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:radial-gradient(120% 90% at 50% 0%, #20283a 0%, #0a0d14 60%);
    font-family:'Hanken Grotesk',system-ui,sans-serif; color:#eef1f8;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding:34px 16px 60px; gap:22px;
  }
  .stage{ display:flex; flex-direction:column; align-items:center; gap:18px; }

  /* iPhone 17 Pro — ~402×874 logical screen */
  .device{
    position:relative;
    width:430px; height:902px;
    border-radius:66px;
    padding:13px;
    background:
      linear-gradient(135deg,#5b6068 0%,#2b2e34 22%,#3c4047 50%,#23262c 78%,#4a4e55 100%);
    box-shadow:
      0 2px 0 1px rgba(255,255,255,.10) inset,
      0 40px 90px rgba(0,0,0,.6),
      0 8px 30px rgba(0,0,0,.45);
  }
  .device::before{ /* inner antenna ring */
    content:""; position:absolute; inset:7px; border-radius:60px;
    background:linear-gradient(135deg,#1c1f25,#34383f); z-index:0;
  }
  .screen{
    position:relative; z-index:1;
    width:404px; height:876px;
    border-radius:54px; overflow:hidden;
    background:#0b0e16;
    box-shadow:0 0 0 2px #0a0c12;
  }
  .screen iframe{ width:100%; height:100%; border:0; display:block; background:#0b0e16; }

  /* dynamic island */
  .island{
    position:absolute; top:13px; left:50%; transform:translateX(-50%);
    width:126px; height:35px; background:#000; border-radius:20px; z-index:5;
    box-shadow:0 0 0 .5px rgba(255,255,255,.06);
    display:flex; align-items:center; justify-content:flex-end; padding-right:11px; gap:8px;
  }
  .island .cam{ width:11px; height:11px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #2a3550 0 40%, #060708 60%); box-shadow:0 0 0 1px rgba(255,255,255,.05); }

  /* status bar overlay */
  .statusbar{
    position:absolute; top:0; left:0; right:0; height:54px; z-index:4;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 30px 0; pointer-events:none;
  }
  .statusbar .time{ font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; color:#fff; letter-spacing:.02em; }
  .statusbar .ind{ display:flex; align-items:center; gap:7px; }
  .statusbar svg{ display:block; }

  /* side buttons */
  .btn{ position:absolute; background:linear-gradient(90deg,#23262c,#3c4047); border-radius:3px; z-index:0; }
  .btn.silent{ left:-3px; top:168px; width:4px; height:34px; }
  .btn.action{ left:-3px; top:214px; width:4px; height:34px; }
  .btn.voldn{ left:-3px; top:260px; width:4px; height:64px; }
  .btn.power{ right:-3px; top:232px; width:4px; height:96px; }

  .caption{ text-align:center; max-width:430px; }
  .caption .t{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; }
  .caption .s{ font-size:13px; color:#8b95ab; margin-top:4px; line-height:1.5; }
</style>
</head>
<body>
  <div class="stage">
    <div class="device">
      <span class="btn silent"></span>
      <span class="btn action"></span>
      <span class="btn voldn"></span>
      <span class="btn power"></span>
      <div class="screen">
        <div class="island"><span class="cam"></span></div>
        <div class="statusbar">
          <span class="time">9:41</span>
          <span class="ind">
            <!-- cellular -->
            <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
            <!-- wifi -->
            <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.2c2.7 0 5.2 1 7 2.8l-1.5 1.6A7.8 7.8 0 0 0 8.5 4.3 7.8 7.8 0 0 0 3 6.6L1.5 5A9.9 9.9 0 0 1 8.5 2.2Z" fill="#fff"/><path d="M8.5 6c1.5 0 2.9.6 4 1.6l-1.6 1.7c-.65-.6-1.5-1-2.4-1s-1.75.4-2.4 1L4.5 7.6A5.9 5.9 0 0 1 8.5 6Z" fill="#fff"/><circle cx="8.5" cy="10.4" r="1.4" fill="#fff"/></svg>
            <!-- battery -->
            <svg width="27" height="13" viewBox="0 0 27 13"><rect x="1" y="1" width="22" height="11" rx="3" fill="none" stroke="#fff" stroke-opacity=".5"/><rect x="3" y="3" width="16" height="7" rx="1.5" fill="#fff"/><rect x="24.5" y="4.5" width="1.6" height="4" rx=".8" fill="#fff" fill-opacity=".5"/></svg>
          </span>
        </div>
        <iframe id="screen" title="Pack Tracker — Direction C"></iframe>
      </div>
    </div>
    <div class="caption">
      <div class="t">Direction C · Gallery — iPhone 17 Pro</div>
      <div class="s">Field-leaning density on mobile: art banner, the deal-check decision, diminishing returns, stats &amp; orders. The completion gauge, chase odds and art gallery collapse away — they reappear in full “Desk” density on desktop.</div>
    </div>
  </div>
  <script>
    // Inherit the preview token (?t=) from the parent so the embedded page can load.
    (function(){
      var t = new URLSearchParams(location.search).get('t');
      var src = 'Pack%20Tracker.html?layout=C' + (t ? '&t=' + encodeURIComponent(t) : '');
      document.getElementById('screen').src = src;
    })();
  </script>
</body>
</html>
