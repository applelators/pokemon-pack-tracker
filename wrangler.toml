name = "pokemon-pack-tracker"
main = "_worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

routes = [
  { pattern = "packs.nabunan.com", custom_domain = true }
]

# Daily market-price snapshot into price_history (23:10 UTC ≈ 6–7pm ET "daily close").
[triggers]
crons = ["10 23 * * *"]

[assets]
directory = "public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "pokemon-pack-tracker"
database_id = "f8294942-fd1b-4d84-9f21-b4a80d1ee3a2"
