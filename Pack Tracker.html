<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pack Tracker — redesign prototype</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%23fff' stroke='%2311161f' stroke-width='6'/%3E%3Cpath d='M5 50a45 45 0 0 1 90 0Z' fill='%23ee1c25'/%3E%3Crect x='5' y='46' width='90' height='8' fill='%2311161f'/%3E%3Ccircle cx='50' cy='50' r='15' fill='%23fff' stroke='%2311161f' stroke-width='6'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0b0e16; --panel:#151b29; --panel2:#0f1422; --panel3:#161d2c; --chip:#222c40;
    --border:#2b3346; --border2:#2e3650; --line:#232b3e;
    --text:#eef1f8; --muted:#7d889e; --muted2:#9aa4ba; --soft:#aeb7ca;
    --accent:#ffcb05; --accent-ink:#1a1300; --blue:#4a82f0;
    --good:#2fd58a; --fair:#ffb020; --bad:#f76b6b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh; background:radial-gradient(120% 80% at 50% -10%, #141b2b 0%, #0b0e16 60%);
    color:var(--text); font-family:'Hanken Grotesk',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    padding-bottom:90px;
  }
  .disp{font-family:'Space Grotesk',sans-serif;}
  ::-webkit-scrollbar{height:8px;width:9px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  button{font-family:inherit;}
  input,select{font-family:inherit;}
  @keyframes popIn{from{transform:translateY(8px) scale(.99);opacity:0;}to{transform:none;opacity:1;}}
  @keyframes sheetUp{from{transform:translateY(24px);opacity:.4;}to{transform:none;opacity:1;}}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}

  .wrap{max-width:1060px;margin:0 auto;padding:22px 18px 0;}

  .switcher{position:fixed;bottom:16px;left:16px;z-index:80;display:flex;align-items:center;gap:7px;
    background:rgba(15,20,34,.82);backdrop-filter:blur(10px);border:1px solid var(--border);
    border-radius:999px;padding:5px 7px 5px 13px;box-shadow:0 8px 24px rgba(0,0,0,.35);}
  .switcher .lab{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8b95ab;font-weight:600;}
  .switcher button{width:30px;height:30px;border-radius:999px;border:none;cursor:pointer;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;background:transparent;color:var(--muted2);}
  .switcher button.on{background:var(--accent);color:var(--accent-ink);}

  .head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .name{font-weight:700;font-size:20px;letter-spacing:-.02em;}
  .pill-label{font-size:11px;color:#75809a;border:1px solid var(--border);border-radius:999px;padding:3px 9px;letter-spacing:.04em;}
  .seg{display:flex;background:var(--panel3);border:1px solid var(--border);border-radius:999px;padding:4px;gap:2px;}
  .seg.sq{border-radius:11px;}
  .seg button{border:none;cursor:pointer;font-size:13px;font-weight:600;padding:6px 16px;border-radius:999px;background:transparent;color:var(--soft);}
  .seg.sq button{border-radius:8px;padding:7px 15px;}
  .seg button.on{background:var(--accent);color:var(--accent-ink);}

  .eyebrow{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#75809a;font-weight:600;}
  .uplabel{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);font-weight:600;}

  .pills{display:flex;gap:9px;overflow-x:auto;padding-bottom:6px;margin:9px 0 20px;}
  .pill{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:9px 14px 9px 10px;border-radius:14px;cursor:pointer;
    border:1px solid var(--border);background:#141a27;}
  .pill.on{border-color:var(--accent);background:linear-gradient(180deg,#1e2842,#18203358);box-shadow:0 0 0 1px #ffcb0533,0 8px 20px rgba(0,0,0,.25);}
  .pill .sym{display:grid;place-items:center;width:38px;height:38px;border-radius:9px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:11px;color:rgba(255,255,255,.92);background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.06) 0 2px,transparent 2px 9px);}
  .pill .pn{font-size:14px;font-weight:700;color:#cfd6e6;line-height:1.15;}
  .pill.on .pn{color:#fff;}
  .pill .pm{font-size:11px;color:var(--muted);}
  .pill .col{display:flex;flex-direction:column;align-items:flex-start;}
  .pill.add{border:1px dashed #39435a;background:transparent;color:var(--muted2);font-size:13px;font-weight:600;padding:0 16px;gap:7px;}

  .modebar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .modebar .hint{font-size:12px;color:var(--muted);}

  .banner{position:relative;border-radius:20px;overflow:hidden;margin-bottom:16px;border:1px solid var(--border);min-height:150px;display:flex;align-items:flex-end;}
  .banner .stripe{position:absolute;inset:0;opacity:.5;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.05) 0 2px,transparent 2px 11px);}
  .banner .tag{position:absolute;top:14px;right:16px;font-family:monospace;font-size:10px;letter-spacing:.06em;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.25);border-radius:6px;padding:3px 8px;}
  .banner .bc{position:relative;padding:22px;}
  .banner .bs{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:600;}
  .banner .bn{font-weight:700;font-size:30px;letter-spacing:-.02em;margin-top:2px;}
  .banner .bsub{font-size:13px;color:rgba(255,255,255,.75);margin-top:3px;}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px;}
  .hero{background:linear-gradient(180deg,#18202f 0%,#141a27 100%);border:1px solid var(--border2);border-radius:20px;padding:18px 18px 20px;margin-bottom:16px;box-shadow:0 14px 40px rgba(0,0,0,.32);}
  .hero-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .hero-title{font-weight:700;font-size:17px;}
  .hero-set{font-size:12px;color:var(--muted);}

  .deal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(252px,1fr));gap:18px;align-items:stretch;}
  .stepbox{background:var(--panel2);border:1px solid var(--border);border-radius:16px;padding:18px;display:flex;flex-direction:column;justify-content:center;}
  .stepper{display:flex;align-items:center;justify-content:center;gap:9px;}
  .b5{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);background:#1a2233;color:var(--soft);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;}
  .b1{width:52px;height:52px;border-radius:14px;border:1px solid #39435a;background:#222c40;color:var(--text);cursor:pointer;font-size:26px;line-height:1;}
  .price{min-width:128px;text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:46px;letter-spacing:-.02em;}
  .verdict{border-radius:16px;padding:18px;display:flex;flex-direction:column;justify-content:center;animation:popIn .22s ease;}
  .vword{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:40px;line-height:.9;letter-spacing:-.01em;}
  .vrec{display:flex;align-items:center;gap:9px;margin-top:13px;padding-top:13px;border-top:1px solid rgba(255,255,255,.09);}
  .refs{display:flex;flex-wrap:wrap;gap:18px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);align-items:center;}
  .ref{display:flex;align-items:baseline;gap:6px;font-size:12px;color:var(--muted);}
  .ref b{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--text);}
  .refresh-wrap{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
  .refresh-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .refresh-meta.stale{color:var(--fair);font-weight:600;}
  .refresh-meta .dot{width:6px;height:6px;border-radius:50%;background:var(--fair);box-shadow:0 0 0 3px rgba(255,176,32,.18);}
  .refresh{display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--panel3);color:var(--muted2);border-radius:9px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
  .refresh.rec{border-color:var(--fair);color:var(--fair);}

  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:16px;}
  .drnum{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;line-height:1;color:var(--accent);}
  .bar{height:8px;background:var(--panel2);border-radius:99px;margin-top:13px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--good));border-radius:99px;}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 15px;}
  .stat .k{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .stat .v{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;margin-top:5px;}

  .gauge-wrap{display:flex;align-items:center;gap:18px;margin-top:12px;}
  .gauge{position:relative;width:96px;height:96px;flex:0 0 auto;}
  .gauge .g-c{position:absolute;inset:0;display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;}
  .chase{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px;}
  .slot{background:var(--panel2);border:1px solid var(--border);border-radius:11px;padding:11px 12px;}
  .slot .stars{font-size:13px;letter-spacing:1px;}
  .slot .pk{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;margin-top:5px;}
  .art-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
  .art{flex:0 0 auto;width:118px;}
  .art .ph{height:148px;border-radius:12px;border:1px solid var(--border);background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.045) 0 2px,transparent 2px 10px);display:grid;place-items:center;}
  .art .ph span{font-family:monospace;font-size:10px;color:rgba(255,255,255,.55);}
  .art .cap{font-size:11.5px;color:var(--muted2);margin-top:7px;text-align:center;}

  .sec-head{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px;}
  .sec-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;}
  .btn-primary{display:flex;align-items:center;gap:7px;border:none;cursor:pointer;font-size:13px;font-weight:700;padding:9px 16px;border-radius:11px;background:var(--accent);color:var(--accent-ink);}

  .order{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
  .order .o-meta{min-width:200px;}
  .order .o-row1{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .order .o-date{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;}
  .order .o-vendor{font-size:14px;font-weight:600;}
  .order .o-binder{font-size:10.5px;color:var(--muted2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;}
  .order .o-row2{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .setchip{font-size:11px;font-weight:700;font-family:'Space Grotesk',sans-serif;background:#1a2233;border-radius:6px;padding:3px 8px;}
  .order .o-items{font-size:12px;color:var(--muted);}
  .order .o-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .order .o-fig{display:flex;align-items:center;gap:20px;}
  .order .o-fig .k{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);text-align:right;}
  .order .o-fig .v{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;text-align:right;}
  .flag{font-size:12px;font-weight:700;border-radius:8px;padding:6px 11px;white-space:nowrap;}
  .order-acts{display:flex;gap:6px;}
  .icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--panel3);color:var(--muted2);cursor:pointer;font-size:14px;display:grid;place-items:center;}
  .icon-btn:hover{color:var(--text);}
  .icon-btn.del:hover{color:var(--bad);border-color:var(--bad);}

  .scrim{position:fixed;inset:0;z-index:70;background:rgba(5,7,12,.78);backdrop-filter:blur(5px);display:flex;align-items:flex-end;justify-content:center;animation:fade .15s ease;}
  .sheet{width:100%;max-width:740px;max-height:94vh;overflow-y:auto;background:#101624;border:1px solid var(--border2);border-bottom:none;border-radius:22px 22px 0 0;box-shadow:0 -20px 60px rgba(0,0,0,.5);animation:sheetUp .28s cubic-bezier(.22,1,.36,1);}
  .sheet-head{position:sticky;top:0;z-index:2;background:#101624;border-bottom:1px solid var(--line);padding:18px 20px;display:flex;align-items:center;justify-content:space-between;border-radius:22px 22px 0 0;}
  .sheet-body{padding:18px 20px;}
  .close{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--panel3);color:var(--soft);cursor:pointer;font-size:16px;}
  .field{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted2);font-weight:600;}
  .field input,.field select{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;}
  .metagrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .seg.fill button{flex:1;}
  .quick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .qchip{display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--panel3);color:#cfd6e6;border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer;}
  .lines{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:16px;}
  .lrow{display:flex;flex-wrap:wrap;align-items:flex-end;gap:10px;padding:13px;border-bottom:1px solid #1d2433;background:var(--panel2);}
  .lrow:last-child{border-bottom:none;}
  .lcol{display:flex;flex-direction:column;gap:5px;}
  .lcol .lk{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .lrow select,.lrow input{background:var(--panel3);border:1px solid var(--border);border-radius:9px;padding:9px 10px;color:var(--text);font-size:13.5px;}
  .lrow select{font-weight:600;cursor:pointer;}
  .lt{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;padding:9px 0;}
  .lrm{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:var(--panel3);color:var(--bad);cursor:pointer;font-size:15px;}
  .lart{width:46px;height:58px;border-radius:8px;border:1px solid var(--border);display:grid;place-items:center;flex:0 0 auto;align-self:flex-end;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.06) 0 2px,transparent 2px 9px);box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .lart span{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:10px;color:rgba(255,255,255,.9);letter-spacing:.02em;}
  .accord{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:18px;}
  .accord-btn{width:100%;display:flex;align-items:center;justify-content:space-between;border:none;cursor:pointer;background:var(--panel2);color:#cfd6e6;padding:13px 15px;font-size:13.5px;font-weight:600;}
  .accord-body{padding:14px 15px;border-top:1px solid #1d2433;background:var(--panel2);font-size:12.5px;color:var(--muted);}
  .sec-steps{display:flex;flex-direction:column;gap:8px;}
  .sec-step{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--panel3);border:1px solid var(--border);border-radius:10px;padding:9px 12px;}
  .sec-step.has{border-color:var(--accent);}
  .sec-tag{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--soft);flex-wrap:wrap;}
  .sec-odds{font-size:11px;font-weight:400;color:var(--muted);margin-left:4px;}
  .sec-ctrl{display:flex;align-items:center;gap:8px;flex:0 0 auto;}
  .sec-b{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer;font-size:17px;line-height:1;}
  .sec-b:disabled{opacity:.35;cursor:not-allowed;}
  .sec-n{font-family:'Space Grotesk',sans-serif;font-weight:700;min-width:18px;text-align:center;}
  .tag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:8px;margin-top:12px;}
  .tagcard{display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid var(--border);background:var(--panel3);border-radius:10px;padding:11px 6px;cursor:pointer;}
  .tagcard.on{border-color:var(--accent);background:rgba(255,203,5,.10);}
  .tnum{font-size:10px;color:var(--muted2);font-weight:600;}
  .bd-row{display:flex;align-items:center;gap:10px;font-size:12.5px;padding:7px 0;border-bottom:1px solid var(--line);}
  .bd-row:last-child{border-bottom:none;}
  .bd-name{flex:1;font-weight:600;}
  .bd-pp{font-family:'Space Grotesk',sans-serif;color:var(--soft);}
  .rar-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .rchip{font-size:12px;color:var(--muted2);background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;}
  .rchip b{font-family:'Space Grotesk',sans-serif;color:var(--text);}
  .rprob{font-size:10.5px;color:var(--muted);margin-left:2px;}
  .scale{margin-top:8px;}
  .scale-bar{position:relative;height:12px;display:flex;margin-top:30px;}
  .scale-bar .z{height:100%;}
  .scale-bar .z:first-child{border-radius:99px 0 0 99px;}
  .scale-bar .z:last-child{border-radius:0 99px 99px 0;}
  .scale-ptr{position:absolute;top:-24px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;}
  .scale-ptr::after{content:"▾";color:var(--text);font-size:14px;line-height:1;margin-top:1px;}
  .scale-bub{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;background:#0f1422;border:1px solid var(--border);border-radius:7px;padding:2px 7px;white-space:nowrap;}
  .scale-labels{display:flex;justify-content:space-between;margin-top:11px;font-size:11.5px;font-weight:600;}
  .scale-cap{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.5;}
  .scale-cap b{color:var(--soft);font-family:'Space Grotesk',sans-serif;}
  .set-toggle{display:flex;flex-direction:column;align-items:flex-start;width:100%;border:1px solid var(--border);background:var(--panel2);color:var(--soft);border-radius:10px;padding:11px 13px;font-size:13px;font-weight:600;cursor:pointer;text-align:left;}
  .set-toggle.on{border-color:var(--accent);color:var(--text);background:rgba(255,203,5,.08);}
  .set-toggle small{font-weight:400;font-size:11.5px;color:var(--muted);margin-top:3px;}
  .actual-wrap{display:flex;flex-direction:column;gap:5px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-top:10px;}
  .actual-wrap input{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:8px 10px;color:var(--text);font-size:14px;font-family:'Space Grotesk',sans-serif;max-width:170px;}
  .totbar{position:sticky;bottom:0;background:#101624;border-top:1px solid var(--line);padding:16px 0 4px;}
  .totline{display:flex;flex-wrap:wrap;gap:18px;align-items:baseline;margin-bottom:14px;}
  .tot{display:flex;align-items:baseline;gap:6px;font-size:12px;color:var(--muted);}
  .tot b{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--text);}
  .grand{margin-left:auto;}
  .grand b{font-size:24px;color:var(--accent);font-weight:700;}
  .acts{display:flex;gap:10px;}
  .save{flex:1;border:none;cursor:pointer;font-size:14px;font-weight:700;padding:13px;border-radius:12px;background:var(--accent);color:var(--accent-ink);}

// ---- deal math ----
function verdict(perPack, set){
  const M = marketOf(set);
  if (perPack <= set.ceiling) return { word:"BUY", icon:"✓", color:"var(--good)", bg:"rgba(47,213,138,.10)", border:"rgba(47,213,138,.35)", tone:"good" };
  if (perPack >= M*1.25) return { word:"PASS", icon:"✕", color:"var(--bad)", bg:"rgba(247,107,107,.10)", border:"rgba(247,107,107,.35)", tone:"bad" };
  return { word:"FAIR", icon:"~", color:"var(--fair)", bg:"rgba(255,176,32,.10)", border:"rgba(255,176,32,.35)", tone:"fair" };
}
function looseRec(perPack, set, v){
  const M = marketOf(set);
  const rem = Math.max(0, set.drPacks - set.packsBought);
  if (v.tone==="good") return { big:"Buy ~"+rem, text:"value holds until diminishing returns kick in." };
  if (v.tone==="fair"){ const over = Math.max(0, perPack-M); const n = over>0 ? Math.max(1, Math.floor(6/over)) : rem; return { big:"Buy ~"+n, text:"a few for fun — the premium adds up after that." }; }
  return { big:"Pass", text:"rip nearer "+money(M)+"/pack instead." };
}
function bundleRec(perPack, set, v){
  if (v.tone==="good") return { big:"Grab it", text:money(perPack)+"/pack across "+set.bundlePacks+" packs — solid." };
  if (v.tone==="fair") return { big:"Maybe", text:money(perPack)+"/pack — fine if you want it sealed." };
  return { big:"Pass", text:money(perPack)+"/pack is above a fair rip." };
}

// ---- orders ----
function computeOrder(o){
  let subtotal=0, packs=0, qty=0;
  o.lines.forEach(l=>{ const q=Number(l.qty)||0, p=Number(l.price)||0; subtotal+=q*p; packs+=q*(PPU[l.product]||1); qty+=q; });
  const discount = (o.store==="Target" && o.circle) ? subtotal*0.05 : 0;
  const taxable = subtotal - discount;
  const tax = taxable*(Number(o.tax)||0)/100;
  const sets=[...new Set(o.lines.map(l=>l.setId))];
  let items;
  if (sets.length>1) items = sets.length+" sets · "+packs+" packs";
  else if (o.lines.length===1) items = o.lines[0].qty+"× "+o.lines[0].product+" · "+packs+" packs";
  else items = o.lines.length+" lines · "+packs+" packs";
  const total = taxable+tax;
  return { subtotal, discount, tax, total, packs, sets, items, perPack: packs>0 ? total/packs : 0 };
}

// ---- actions ----
function liveStats(setId, binder){
  let spent=0, packs=0, orders=0;
  state.orders.forEach(o=>{
    if(o.binder!==binder) return;
    let sub=0, pk=0;
    o.lines.forEach(l=>{ if(l.setId===setId){ const q=Number(l.qty)||0,p=Number(l.price)||0; sub+=q*p; pk+=q*(PPU[l.product]||1); } });
    if(pk>0||sub>0){ orders++; const disc=(o.store==="Target"&&o.circle)?0.95:1; spent+=sub*disc*(1+(Number(o.tax)||0)/100); packs+=pk; }
  });
  return { spent, packs, orders };
}

  const bad = M*1.25;
  const hiS = Math.max(bad*1.25, perPack*1.1, set.ev*1.1, set.ceiling*1.3);

        <div class="stepbox">
          <div class="uplabel" style="text-align:center;margin-bottom:14px;">${isLoose?"Vendor's price per pack":"Vendor's price per bundle"}</div>
          <div class="stepper">
            <button class="b5" data-act="step" data-v="-5">−5</button>

            <button class="b5" data-act="step" data-v="5">+5</button>

        </div>
        <div class="verdict" style="background:${v.bg};border:1px solid ${v.border}">
          <div style="display:flex;align-items:center;gap:11px;"><span class="vword" style="color:${v.color}">${v.word}</span><span style="font-size:26px">${v.icon}</span></div>
          <div style="font-size:13.5px;color:#d6dcea;margin-top:9px;line-height:1.4;">${
            isLoose
              ? (v.tone==="good"?("At or under the "+money(set.ceiling)+" good-deal line for this set."):v.tone==="bad"?("More than 25% over the "+money(M)+" cheapest rip."):"Between the good-deal line and overpaying.")
              : (v.tone==="good"?("Per-pack price beats the "+money(set.ceiling)+" good-deal line."):v.tone==="bad"?"Per-pack price is well over a fair rip.":"Per-pack price sits in the fair range.")
          }</div>
          <div class="vrec"><span class="disp" style="font-weight:700;font-size:22px;">${rec.big}</span><span style="font-size:13px;color:#d6dcea;line-height:1.35;">${rec.text}</span></div>
        </div>
      </div>
      <div class="refs">
        <div class="refresh-wrap" style="margin-left:0;">
          <span class="refresh-meta${stale?" stale":""}">${stale?'<span class="dot"></span>':""}Updated ${fmtDate(set.lastRefresh)}${stale?" · refresh recommended":""}</span>
          <button class="refresh${stale?" rec":""}" data-act="refresh">↻ Refresh market</button>
        </div>

      ${dealScaleHTML}

    <div class="grid2">

function renderLines(){
  const box = document.getElementById("lines");
  if (!box) return;
  const setOpts = (sel) => trackedSets().map(s => `<option value="${s.id}"${s.id===sel?" selected":""}>${s.name}</option>`).join("");
  box.innerHTML = state.draft.lines.map(l => {
    const ppu = PPU[l.product]||1; const s = setById(l.setId);
    return `<div class="lrow" data-line="${l.id}">
      <div class="lart${isSpecial(s)?' sp':''}" style="background-color:#10182a;background:linear-gradient(160deg, ${s.tint} 0%, #10182a 80%)"><span>${s.code}</span></div>
      <div class="lcol" style="flex:1 1 140px;min-width:120px;"><span class="lk">Set</span>
        <select data-lf="setId">${setOpts(l.setId)}</select></div>
      <div class="lcol" style="flex:1 1 130px;min-width:120px;"><span class="lk">${l.product}</span><span style="font-size:12px;color:var(--muted);padding:6px 0;">${ppu} pack${ppu>1?"s":""}/unit</span></div>
      <div class="lcol" style="width:64px;"><span class="lk">Qty</span><input type="number" min="1" data-lf="qty" value="${l.qty}"></div>
      <div class="lcol" style="width:96px;"><span class="lk">Unit $</span><input type="number" min="0" step="0.01" data-lf="price" value="${l.price}" placeholder="0.00"></div>
      <div class="lcol" style="width:78px;text-align:right;"><span class="lk">Line</span><span class="lt" data-lt="${l.id}">$0.00</span></div>
      <button class="lrm" data-cact="rm" data-v="${l.id}">✕</button>
    </div>`;

}

function recalc(){
  const t = draftTotals();
  const sub=document.getElementById("t-sub"); if(!sub) return;
  sub.textContent = money(t.subtotal);
  document.getElementById("t-tax").textContent = money(t.tax);
  document.getElementById("t-packs").textContent = t.packs;
  document.getElementById("t-total").textContent = money(t.total);
  const disc=document.getElementById("t-disc");
  if(disc){ if(t.discount>0){ disc.style.display=""; document.getElementById("t-disc-v").textContent="-"+money(t.discount); } else disc.style.display="none"; }
  state.draft.lines.forEach(l => {
    const el = document.querySelector('[data-lt="'+l.id+'"]');
    if (el) el.textContent = money((Number(l.qty)||0)*(Number(l.price)||0));
  });
}

// ---- sets modal render ----
function renderSetsModal(){
  const host = document.getElementById("setsmodal");
  if (!state.setsOpen){ host.innerHTML=""; return; }
  const rows = SETS.slice().sort((a,b)=>b.rs-a.rs).map(s => {
    const lockedRemove = setHasData(s.id);
    const actions = s.tracked
      ? `<span class="badge">Tracked</span>
         <button class="icon-btn" data-mact="reimport" data-v="${s.id}" title="Reimport — refresh art & prices">↻</button>
         <button class="icon-btn del${lockedRemove?' off':''}" ${lockedRemove?'':`data-mact="delset"`} data-v="${s.id}" title="${lockedRemove?'Has orders or packs — can’t remove':'Remove from tracked'}">✕</button>`
      : `<button class="btn-import" data-mact="import" data-v="${s.id}">Import</button>`;
    const drRem = Math.max(0, s.drPacks - s.packsBought);
    const badges = `${isSpecial(s)?'<span class="sp-chip">✦ Special</span>':''}${isOOP(s)?'<span class="oop">likely out of print</span>':''}`;
    return `<div class="exp-row">
      <div class="exp-num${isSpecial(s)?' sp':''}" style="background-color:#10182a;background:linear-gradient(160deg, ${s.tint} 0%, #10182a 80%)">${s.code}</div>
      <div class="exp-info">
        <div class="exp-name">${s.name}${badges}</div>
        <div class="exp-meta">${s.series} · ${s.release} · ${s.base} cards</div>
        <div class="exp-stats">Loose rip <b>${money(marketOf(s))}</b> · <b>${s.packsBought}/${s.drPacks}</b> packs bought · <b>${drRem}</b> to diminishing returns</div>
      </div>
      <div class="exp-actions">${actions}</div>
    </div>`;
  }).join("");

  host.innerHTML = `
    <div class="scrim" data-mact="bg">
      <div class="sheet" data-mact="stop">
        <div class="sheet-head">
          <div><div class="disp" style="font-weight:700;font-size:18px;">Add or manage sets</div><div style="font-size:12px;color:var(--muted);margin-top:1px;">Newest first · import, reimport (refresh art &amp; prices), or remove</div></div>
          <button class="close" data-mact="close">✕</button>
        </div>
        <div class="sheet-body">
          <div class="exp-grouphdr">Scarlet &amp; Violet era</div>
          <div class="exp-list">${rows}</div>
        </div>
      </div>
    </div>`;
}

// ---- event wiring ----
document.querySelector(".switcher").addEventListener("click", (e)=>{ const b=e.target.closest("button"); if(b&&b.dataset.act==="dir") setDir(b.dataset.v); });

document.getElementById("app").addEventListener("click", (e)=>{
  const b=e.target.closest("[data-act]"); if(!b) return;
  const act=b.dataset.act, v=b.dataset.v;
  if(act==="binder") setBinder(v);
  else if(act==="set") selectSet(v);
  else if(act==="tab") setTab(v);
  else if(act==="mode") setMode(v);
  else if(act==="step") stepPrice(Number(v));
  else if(act==="refresh") refreshMarket();
  else if(act==="addorder") openComposer();
  else if(act==="addset") openSetsModal();
  else if(act==="settings") openSettings();
  else if(act==="pulls") openPulls(Number(v));
  else if(act==="gohub") goHub();
  else if(act==="opensetview") openSetView(v);
  else if(act==="hubinc") hubStep(v,1);
  else if(act==="hubdec") hubStep(v,-1);
  else if(act==="hubaddorder") hubAddOrder(v);
  else if(act==="hubrefresh") hubRefresh(v);
  else if(act==="editorder") editOrder(Number(v));
  else if(act==="delorder") requestDeleteOrder(Number(v));
});
document.getElementById("app").addEventListener("change",(e)=>{
  const t=e.target; if(t.dataset.actual===undefined) return;
  const v=t.value.trim();
  if(v===""||isNaN(Number(v))) delete state.actuals[t.dataset.actual];
  else state.actuals[t.dataset.actual]=Math.max(0,Math.round(Number(v)));
  persist(); render();
});

document.getElementById("composer").addEventListener("click", (e)=>{
  const b=e.target.closest("[data-cact]"); if(!b) return;
  const act=b.dataset.cact, v=b.dataset.v;
  if(act==="bg"||act==="close") closeComposer();
  else if(act==="stop") e.stopPropagation();
  else if(act==="add") addLine(v);
  else if(act==="rm") removeLine(Number(v));
  else if(act==="dbinder"){ state.draft.binder=v; renderComposer(); }
  else if(act==="circle"){ state.draft.circle=!state.draft.circle; renderComposer(); }
  else if(act==="save") saveOrder();
});
document.getElementById("composer").addEventListener("input", (e)=>{
  const t=e.target;
  if(t.dataset.df){ state.draft[t.dataset.df] = t.value; if(t.dataset.df==="store") renderComposer(); else recalc(); }
  else if(t.dataset.lf){
    const row=t.closest("[data-line]"); const id=Number(row.dataset.line);
    const line=state.draft.lines.find(l=>l.id===id);
    if(line){ line[t.dataset.lf] = t.value; if(t.dataset.lf==="setId") renderLines(); recalc(); }
  }
});

document.getElementById("setsmodal").addEventListener("click", (e)=>{
  const b=e.target.closest("[data-mact]"); if(!b) return;
  const act=b.dataset.mact, v=b.dataset.v;
  if(act==="bg"||act==="close") closeSetsModal();
  else if(act==="stop") e.stopPropagation();
  else if(act==="import") importSet(v);
  else if(act==="reimport") reimportSet(v);
  else if(act==="delset") deleteSetTracked(v);
});

    </div>`;
}
document.getElementById("settings").addEventListener("click",(e)=>{
  const b=e.target.closest("[data-gact]"); if(!b) return;
  const a=b.dataset.gact;
  if(a==="bg"||a==="close") closeSettings();
  else if(a==="stop") e.stopPropagation();
  else if(a==="adv") toggleAdvanced();
  else if(a==="toggleshared"){ state.settings.showShared=!state.settings.showShared; if(!state.settings.showShared) state.binder="mine"; persist(); renderSettings(); render(); }
});
document.getElementById("settings").addEventListener("input",(e)=>{
  const t=e.target;
  if(t.dataset.sf){ state.settings[t.dataset.sf]=t.value; persist(); }
  else if(t.dataset.spp){ state.settings.ppp[t.dataset.spp]=Number(t.value)||0; persist(); }
  else if(t.dataset.scr){ state.settings.chase[Number(t.dataset.scr)].rate=Number(t.value)||0; persist(); }
});

function openPulls(id){ const o=state.orders.find(x=>x.id===id); if(!o) return; state.pullsOpen=true; state.pullsId=id; state.pullsFinds={...(o.finds||{})}; state.pullsTagged=[...(o.tagged||[])]; state.pullsTagOpen=false; renderPulls(); }
function closePulls(){ state.pullsOpen=false; renderPulls(); }
function savePulls(){ const o=state.orders.find(x=>x.id===state.pullsId); if(o){ o.finds={...state.pullsFinds}; o.tagged=[...state.pullsTagged]; persist(); } state.pullsOpen=false; renderPulls(); render(); toast("Pulls saved"); }
function pullsStep(abbr,d){ state.pullsFinds[abbr]=Math.max(0,(Number(state.pullsFinds[abbr])||0)+d); renderPulls(); }
function pullsTagToggle(){ state.pullsTagOpen=!state.pullsTagOpen; renderPulls(); }
function pullsTagPick(id){ const t=state.pullsTagged; const i=t.indexOf(id); if(i>=0)t.splice(i,1); else t.push(id); renderPulls(); }
function renderPulls(){
  const host=document.getElementById("pulls");
  if(!state.pullsOpen){ host.innerHTML=""; return; }
  const o=state.orders.find(x=>x.id===state.pullsId); if(!o){ host.innerHTML=""; return; }
  const packs=computeOrder(o).packs;
  const finds=state.pullsFinds;
  const steps=SECRET.map(r=>{
    const found=Number(finds[r.abbr])||0, exp=r.rate*packs, pn=binomAtLeast(packs,r.rate,found+1);
    return `<div class="sec-step${found>0?' has':''}">
      <div class="sec-tag"><span style="color:${r.color};letter-spacing:1px">${r.glyph}</span> ${r.abbr}<span class="sec-odds">${packs>0?`≈${exp.toFixed(exp<1?2:1)} expected · ${Math.round(pn*100)}% for ${found+1}+`:"no packs in this order"}</span></div>
      <div class="sec-ctrl"><button class="sec-b" data-pact="dec" data-v="${r.abbr}"${found<=0?" disabled":""}>−</button><span class="sec-n">${found}</span><button class="sec-b" data-pact="inc" data-v="${r.abbr}">+</button></div>
    </div>`;
  }).join("");
  const tagged=state.pullsTagged;
  const pool=[]; SECRET.forEach((r,ri)=>{ for(let n=1;n<=3;n++) pool.push({id:r.abbr+"-"+n,abbr:r.abbr,color:r.color,glyph:r.glyph,num:String(150+ri*9+n)}); });
  const cards=pool.map(c=>`<button class="tagcard${tagged.includes(c.id)?' on':''}" data-pact="pick" data-v="${c.id}"><span style="color:${c.color};font-size:15px">${c.glyph}</span><span class="tnum">${c.abbr} ${c.num}</span></button>`).join("");
  host.innerHTML=`<div class="scrim" data-pact="bg"><div class="sheet" data-pact="stop">
    <div class="sheet-head"><div><div class="disp" style="font-weight:700;font-size:18px;">Tag pulls</div><div style="font-size:12px;color:var(--muted);margin-top:1px;">${fmtDate(o.dateISO)} · ${o.vendor} · ${packs} packs opened</div></div><button class="close" data-pact="close">✕</button></div>
    <div class="sheet-body">
      <div class="uplabel" style="margin-bottom:9px;">Secret cards pulled this order</div>
      <div class="sec-steps">${steps}</div>
      <button class="qchip" data-pact="tagtoggle" style="margin-top:14px;">🃏 Tag the exact cards you pulled${tagged.length?` · ${tagged.length} tagged`:""}</button>
      ${state.pullsTagOpen?`<div class="tag-grid">${cards}</div>`:""}
      <div class="totbar"><div class="acts"><button class="save" data-pact="save">Save pulls</button><button class="cancel" data-pact="close">Cancel</button></div></div>
    </div>
  </div></div>`;
}
document.getElementById("pulls").addEventListener("click",(e)=>{
  const b=e.target.closest("[data-pact]"); if(!b) return;
  const a=b.dataset.pact, v=b.dataset.v;
  if(a==="bg"||a==="close") closePulls();
  else if(a==="stop") e.stopPropagation();
  else if(a==="inc") pullsStep(v,1);
  else if(a==="dec") pullsStep(v,-1);
  else if(a==="tagtoggle") pullsTagToggle();
  else if(a==="pick") pullsTagPick(v);
  else if(a==="save") savePulls();
});

if (LOCKED) { const sw=document.querySelector(".switcher"); if(sw) sw.style.display="none"; document.getElementById("app").style.paddingTop="60px"; }
let rzt; window.addEventListener("resize", ()=>{ clearTimeout(rzt); rzt=setTimeout(render, 150); });
render();
</script>
</body>
</html>
